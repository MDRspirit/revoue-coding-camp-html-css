<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Page</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-glass: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-600 via-pink-500 to-orange-400 flex items-center justify-center p-8 font-sans">

    <div class="w-full max-w-2xl space-y-6">

        <!-- Page Title -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white drop-shadow-lg tracking-wide">My Lists</h1>
            <p class="text-white/70 mt-2 text-sm">A beautiful collection of lists</p>
        </div>

        <!-- Unordered List Card -->
        <div class="backdrop-blur-md bg-white/15 border border-white/30 rounded-2xl p-6 shadow-2xl">
            <div class="flex items-center gap-3 mb-5">
                <div class="w-8 h-8 rounded-full bg-white/30 flex items-center justify-center text-white font-bold text-sm">🍉</div>
                <h2 class="text-xl font-semibold text-white tracking-wide">Buah-buahan</h2>
            </div>
            <ul class="space-y-3">
                <li class="flex items-center gap-3 backdrop-blur-sm bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white hover:bg-white/20 transition-all duration-200 cursor-default">
                    <span class="text-lg">🥭</span>
                    <span class="font-medium">Mangga</span>
                </li>
                <li class="flex items-center gap-3 backdrop-blur-sm bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white hover:bg-white/20 transition-all duration-200 cursor-default">
                    <span class="text-lg">🍌</span>
                    <span class="font-medium">Pisang</span>
                </li>
                <li class="flex items-center gap-3 backdrop-blur-sm bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white hover:bg-white/20 transition-all duration-200 cursor-default">
                    <span class="text-lg">🍈</span>
                    <span class="font-medium">Jambu</span>
                </li>
            </ul>
        </div>

        <!-- Ordered List Card -->
        <div class="backdrop-blur-md bg-white/15 border border-white/30 rounded-2xl p-6 shadow-2xl">
            <div class="flex items-center gap-3 mb-5">
                <div class="w-8 h-8 rounded-full bg-white/30 flex items-center justify-center text-white font-bold text-sm">📋</div>
                <h2 class="text-xl font-semibold text-white tracking-wide">Cara Membuat Repository</h2>
            </div>
            <ol class="space-y-3">
                <li class="flex items-center gap-4 backdrop-blur-sm bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white hover:bg-white/20 transition-all duration-200 cursor-default">
                    <span class="w-7 h-7 rounded-full bg-white/30 flex items-center justify-center text-xs font-bold shrink-0">1</span>
                    <span class="font-medium">Buka Github.com</span>
                </li>
                <li class="flex items-center gap-4 backdrop-blur-sm bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white hover:bg-white/20 transition-all duration-200 cursor-default">
                    <span class="w-7 h-7 rounded-full bg-white/30 flex items-center justify-center text-xs font-bold shrink-0">2</span>
                    <span class="font-medium">Klik tombol plus di kanan atas</span>
                </li>
                <li class="flex items-center gap-4 backdrop-blur-sm bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white hover:bg-white/20 transition-all duration-200 cursor-default">
                    <span class="w-7 h-7 rounded-full bg-white/30 flex items-center justify-center text-xs font-bold shrink-0">3</span>
                    <span class="font-medium">Pilih New Repository</span>
                </li>
                <li class="flex items-center gap-4 backdrop-blur-sm bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white hover:bg-white/20 transition-all duration-200 cursor-default">
                    <span class="w-7 h-7 rounded-full bg-white/30 flex items-center justify-center text-xs font-bold shrink-0">4</span>
                    <span class="font-medium">Isi nama Repository</span>
                </li>
                <li class="flex items-center gap-4 backdrop-blur-sm bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white hover:bg-white/20 transition-all duration-200 cursor-default">
                    <span class="w-7 h-7 rounded-full bg-white/30 flex items-center justify-center text-xs font-bold shrink-0">5</span>
                    <span class="font-medium">Hidupkan Add Readme</span>
                </li>
                <li class="flex items-center gap-4 backdrop-blur-sm bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white hover:bg-white/20 transition-all duration-200 cursor-default">
                    <span class="w-7 h-7 rounded-full bg-white/30 flex items-center justify-center text-xs font-bold shrink-0">6</span>
                    <span class="font-medium">Klik Create Repository</span>
                </li>
            </ol>
        </div>

    </div>

</body>
</html>
